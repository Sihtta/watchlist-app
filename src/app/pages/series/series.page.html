<ion-content class="page-content">
  <div class="container">
    <h1>Vos Séries</h1>

    @if (series.length === 0) {
      <div class="empty">
        <p>Aucune série dans votre catalogue</p>
        <p>Ajoutez votre première série<br />depuis la recherche</p>

        <button class="add-btn" (click)="goToSearch()">
          +
        </button>
      </div>
    }

    @if (series.length > 0) {
      <div class="filters-row">
        <button class="filter-chip active">Tous</button>
        <button class="filter-chip">En Cours</button>
        <button class="filter-chip">À voir</button>
        <button class="filter-chip">Vu</button>
      </div>
      <div class="grid">
        @for (item of series; track item.id) {
          <div class="card">

            <div class="poster-wrapper">
              <img [src]="item.posterUrl" />

              <div class="rating">
                ⭐ {{ item.rating }}
              </div>
            </div>

            <div class="card-footer">
              <div class="title">{{ item.title }}</div>

              <div class="bottom">
                <span class="status">À voir</span>
                <span class="year">{{ item.year }}</span>
              </div>
            </div>

          </div>
        }
      </div>
    }
  </div>
</ion-content>
